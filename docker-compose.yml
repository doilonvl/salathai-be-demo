services:
  api:
    build:
      context: .
      target: runtime
    container_name: salathai-api
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app-net

  mongo:
    image: mongo:7-jammy
    container_name: salathai-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: salathai
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net

volumes:
  mongo-data:

networks:
  app-net:
    driver: bridge
